<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>生活倒影</title>
  
  <!-- 應用程式圖示設定 -->
  <link rel="icon" href="IMG_5386.jpeg">
  <link rel="apple-touch-icon" href="IMG_5386.jpeg">
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 Babel 以在瀏覽器中編譯 React JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 定義 ES Module 的載入路徑 -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>

  <style>
    /* 處理手機版底部的安全距離 */
    .pb-safe { padding-bottom: max(0.5rem, env(safe-area-inset-bottom)); }
    /* 隱藏捲動條讓介面更乾淨 */
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">

  <!-- React 應用程式的掛載點 -->
  <div id="root"></div>

  <!-- React 程式碼開始 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { 
      getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      signOut, onAuthStateChanged, updateProfile
    } from 'firebase/auth';
    import { 
      getFirestore, collection, addDoc, deleteDoc, doc, 
      onSnapshot, query, updateDoc, setDoc
    } from 'firebase/firestore';
    import { 
      Home, List, CreditCard, Package, Plus, 
      TrendingUp, TrendingDown, DollarSign, Calendar, 
      Trash2, User, Lock, Mail, ChevronRight, Settings, 
      CheckCircle2, Camera, X, Loader2, LogOut, Pencil, AlertTriangle, Pause
    } from 'lucide-react';

    // --- Firebase 初始化 ---
    const firebaseConfig = {
      apiKey: "AIzaSyDKVLVYRGvsiuFmQIXuFCU9O2TBVVRb3gk",
      authDomain: "popcorn-ee2cc.firebaseapp.com",
      projectId: "popcorn-ee2cc",
      storageBucket: "popcorn-ee2cc.firebasestorage.app",
      messagingSenderId: "1095484888994",
      appId: "1:1095484888994:web:3d39b271a04d0935b0c4fb",
      measurementId: "G-N8CGBLE373"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const APP_ID = 'popcorn-ee2cc';

    // --- 自定義下拉分類選擇器 ---
    function CategorySelector({ value, onChange, uniqueCategories, placeholder, onTriggerAddNewCategory }) {
      const [isOpen, setIsOpen] = useState(false);
      const containerRef = useRef(null);

      // 點擊外面時自動關閉選單
      useEffect(() => {
        function handleClickOutside(event) {
          if (containerRef.current && !containerRef.current.contains(event.target)) {
            setIsOpen(false);
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      const handleSelect = (cat) => {
        onChange(cat);
        setIsOpen(false);
      };

      const baseList = uniqueCategories.length > 0 
        ? uniqueCategories 
        : ['飲食', '購物', '娛樂', '數位', '居家', '交通'];

      return (
        <div className="relative w-full" ref={containerRef}>
          <button
            type="button"
            onClick={() => setIsOpen(!isOpen)}
            className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-800 text-sm text-left flex justify-between items-center focus:ring-2 focus:ring-[#C7F3EC] outline-none transition-all"
          >
            <span className={value ? "text-slate-800" : "text-slate-400"}>
              {value || placeholder}
            </span>
            <span className="text-slate-400 text-xs">▼</span>
          </button>

          {isOpen && (
            <div className="absolute left-0 right-0 mt-2 bg-white border border-slate-100 rounded-3xl shadow-xl z-50 p-2 overflow-hidden animate-in zoom-in-95 duration-100 max-h-60 flex flex-col">
              <div className="overflow-y-auto flex-1 space-y-1">
                {baseList.map((cat) => (
                  <button
                    key={cat}
                    type="button"
                    onClick={() => handleSelect(cat)}
                    className="w-full text-left px-4 py-2.5 text-sm rounded-2xl hover:bg-slate-50 transition-colors flex items-center justify-between"
                  >
                    <span className={value === cat ? "font-bold text-[#35a788]" : "text-slate-700"}>
                      {cat}
                    </span>
                    {value === cat && <span className="text-[#35a788] font-bold text-sm">✓</span>}
                  </button>
                ))}
              </div>

              {/* 點擊觸發全局 React Modal 以新增自定義分類 */}
              <div className="border-t border-slate-100 mt-2 pt-2">
                <button
                  type="button"
                  onClick={() => {
                    onTriggerAddNewCategory((newCat) => {
                      handleSelect(newCat);
                    });
                    setIsOpen(false);
                  }}
                  className="w-full py-2.5 text-center text-sm font-semibold text-slate-500 hover:text-[#35a788] transition-colors rounded-2xl hover:bg-slate-50"
                >
                  + 新增自訂分類
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      // --- 身份驗證狀態 ---
      const [user, setUser] = useState(null);
      const [authMode, setAuthMode] = useState('login'); 
      const [authLoading, setAuthLoading] = useState(true);
      const [authMessage, setAuthMessage] = useState({ type: '', text: '' });

      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');

      // --- 應用程式狀態 ---
      const [activeTab, setActiveTab] = useState('dashboard');
      const [transactions, setTransactions] = useState([]);
      const [subscriptions, setSubscriptions] = useState([]);
      const [items, setItems] = useState([]);

      // 表單暫存狀態
      const [txType, setTxType] = useState('expense');
      const [txAmount, setTxAmount] = useState('');
      const [txNote, setTxNote] = useState('');
      const [txCategory, setTxCategory] = useState(''); 
      const [txDate, setTxDate] = useState(getTodayString());

      const [subName, setSubName] = useState('');
      const [subAmount, setSubAmount] = useState('');
      const [subCycle, setSubCycle] = useState('monthly');
      const [subDate, setSubDate] = useState(getTodayString());

      const [itemName, setItemName] = useState('');
      const [itemPrice, setItemPrice] = useState('');
      const [itemCategory, setItemCategory] = useState(''); 
      const [itemDate, setItemDate] = useState(getTodayString());

      // --- 整合個人資料 Modal 與數據 ---
      const [isProfileOpen, setIsProfileOpen] = useState(false);
      const [isSavingProfile, setIsSavingProfile] = useState(false);
      const [profileSaveMsg, setProfileSaveMsg] = useState(null); 
      const [profileData, setProfileData] = useState({
        nickname: '',
        avatar: '',
        dashboardBg: '',
        signature: ''
      });

      // --- 全域彈窗與滑動狀態 ---
      const [deleteDialog, setDeleteDialog] = useState({ isOpen: false, type: '', id: '', data: null });
      const [editDialog, setEditDialog] = useState({ isOpen: false, type: '', id: '', originalData: null, data: null });
      const [isSavingEdit, setIsSavingEdit] = useState(false);
      const [swipedItemId, setSwipedItemId] = useState(null);
      const touchStartX = useRef(0);

      // --- 全局自定義分類 Modal 控制狀態 (比照附圖功能) ---
      const [categoryModal, setCategoryModal] = useState({
        isOpen: false,
        tempName: '',
        onConfirm: null
      });

      // --- 輔助函式 ---
      function getTodayString() {
        const d = new Date();
        const offset = d.getTimezoneOffset();
        const localDate = new Date(d.getTime() - (offset * 60 * 1000));
        return localDate.toISOString().split('T')[0];
      }

      const getDaysUsed = (purchaseDateStr, retireDateStr, isRetired) => {
        const start = new Date(purchaseDateStr);
        const end = (isRetired && retireDateStr) ? new Date(retireDateStr) : new Date();
        start.setHours(0, 0, 0, 0);
        end.setHours(0, 0, 0, 0);
        const diffTime = end - start;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        return diffDays >= 0 ? diffDays + 1 : 1; 
      };

      const totalIncome = transactions.filter(t => t.type === 'income').reduce((sum, t) => sum + t.amount, 0);
      const totalExpense = transactions.filter(t => t.type === 'expense').reduce((sum, t) => sum + t.amount, 0);
      const currentBalance = totalIncome - totalExpense;

      // 提取目前帳戶中所有不重複自定義分類（排除系統保留的 '訂閱'，統一由扣款指派）
      const uniqueCategories = Array.from(
        new Set(
          [
            ...transactions.map(t => t.category),
            ...items.map(i => i.category)
          ].filter(c => c && c !== '訂閱' && c !== '未分類')
        )
      );

      // --- 滑動操作 (Swipe to Reveal) ---
      const handleTouchStart = (e) => {
        touchStartX.current = e.touches[0].clientX;
      };
      const handleTouchEnd = (e, id) => {
        const touchEndX = e.changedTouches[0].clientX;
        const diff = touchStartX.current - touchEndX;
        if (diff > 40) {
          setSwipedItemId(id);
        } else if (diff < -40) {
          setSwipedItemId(null);
        }
      };

      const closeSwipe = () => {
        if (swipedItemId) setSwipedItemId(null);
      };

      // --- Firebase 監聽與認證邏輯 ---
      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            // 【快取加速】
            try {
              const cachedProfile = localStorage.getItem(`life_reflection_profile_${currentUser.uid}`);
              if (cachedProfile) setProfileData(JSON.parse(cachedProfile));

              const cachedTxs = localStorage.getItem(`life_reflection_txs_${currentUser.uid}`);
              if (cachedTxs) setTransactions(JSON.parse(cachedTxs));

              const cachedSubs = localStorage.getItem(`life_reflection_subs_${currentUser.uid}`);
              if (cachedSubs) setSubscriptions(JSON.parse(cachedSubs));

              const cachedItems = localStorage.getItem(`life_reflection_items_${currentUser.uid}`);
              if (cachedItems) setItems(JSON.parse(cachedItems));
            } catch (e) {
              console.warn("讀取本地快取失敗", e);
            }

            setProfileData(prev => ({
              ...prev,
              nickname: currentUser.displayName || prev.nickname,
            }));
          }
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) {
          setTransactions([]);
          setSubscriptions([]);
          setItems([]);
          setProfileData({ nickname: '', avatar: '', dashboardBg: '', signature: '' });
          return;
        }

        const basePath = `artifacts/${APP_ID}/users/${user.uid}`;

        const unsubProfile = onSnapshot(doc(db, basePath, 'profile', 'info'), (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            const updated = {
              nickname: data.nickname || user.displayName || '',
              avatar: data.avatar || '',
              dashboardBg: data.dashboardBg || '',
              signature: data.signature || ''
            };
            setProfileData(updated);
            localStorage.setItem(`life_reflection_profile_${user.uid}`, JSON.stringify(updated));
          }
        });

        const unsubTx = onSnapshot(query(collection(db, basePath, 'transactions')), 
          (snap) => {
            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            data.sort((a, b) => b.createdAt - a.createdAt); 
            setTransactions(data);
            localStorage.setItem(`life_reflection_txs_${user.uid}`, JSON.stringify(data));
          }
        );

        const unsubSub = onSnapshot(query(collection(db, basePath, 'subscriptions')), 
          (snap) => {
            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            data.sort((a, b) => b.createdAt - a.createdAt);
            setSubscriptions(data);
            localStorage.setItem(`life_reflection_subs_${user.uid}`, JSON.stringify(data));
          }
        );

        const unsubItem = onSnapshot(query(collection(db, basePath, 'items')), 
          (snap) => {
            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            data.sort((a, b) => b.createdAt - a.createdAt);
            setItems(data);
            localStorage.setItem(`life_reflection_items_${user.uid}`, JSON.stringify(data));
          }
        );

        return () => { unsubProfile(); unsubTx(); unsubSub(); unsubItem(); };
      }, [user]);

      // --- 自動處理到期的訂閱 ---
      useEffect(() => {
        const processDueSubscriptions = async () => {
          if (!user || subscriptions.length === 0) return;
          const today = getTodayString();
          
          for (const sub of subscriptions) {
            if (sub.isPaused || sub.isPaid) continue;

            if (sub.nextDate <= today) {
              if (sub.cycle === 'buyout') {
                try {
                  await addDoc(collection(db, `artifacts/${APP_ID}/users/${user.uid}/transactions`), {
                    type: 'expense',
                    amount: sub.amount,
                    note: `買斷訂閱: ${sub.name}`,
                    category: '訂閱', 
                    date: sub.nextDate,
                    createdAt: Date.now()
                  });
                  await updateDoc(doc(db, `artifacts/${APP_ID}/users/${user.uid}/subscriptions`, sub.id), {
                    isPaid: true,
                    isPaused: true,
                    nextDate: '已付清'
                  });
                } catch (err) { console.error("買斷處理失敗", err); }
                continue;
              }

              let currentDate = new Date(sub.nextDate);
              const todayDate = new Date(today);
              let expenseCount = 0;
              let deductionDates = [];

              while (currentDate <= todayDate) {
                deductionDates.push(currentDate.toISOString().split('T')[0]);
                expenseCount++;
                
                if (sub.cycle === 'monthly') currentDate.setMonth(currentDate.getMonth() + 1);
                else if (sub.cycle === 'quarterly') currentDate.setMonth(currentDate.getMonth() + 3);
                else if (sub.cycle === 'yearly') currentDate.setFullYear(currentDate.getFullYear() + 1);
              }

              if (expenseCount > 0) {
                try {
                  for (const dDate of deductionDates) {
                    await addDoc(collection(db, `artifacts/${APP_ID}/users/${user.uid}/transactions`), {
                      type: 'expense',
                      amount: sub.amount,
                      note: `自動訂閱扣款: ${sub.name}`,
                      category: '訂閱', 
                      date: dDate,
                      createdAt: Date.now()
                    });
                  }
                  await updateDoc(doc(db, `artifacts/${APP_ID}/users/${user.uid}/subscriptions`, sub.id), {
                    nextDate: currentDate.toISOString().split('T')[0]
                  });
                } catch (err) { console.error("自動扣款處理失敗", err); }
              }
            }
          }
        };
        processDueSubscriptions();
      }, [subscriptions, user]);

      // --- 身份驗證邏輯 ---
      const handleAuth = async (e) => {
        e.preventDefault();
        setAuthMessage({ type: '', text: '' });

        if (authMode === 'register') {
          if (password !== confirmPassword) {
            setAuthMessage({ type: 'error', text: '兩次輸入的密碼不相同' });
            return;
          }
          try {
            await createUserWithEmailAndPassword(auth, email, password);
            await signOut(auth); 
            setAuthMode('login');
            setAuthMessage({ type: 'success', text: '註冊成功！請登入' });
            setPassword('');
            setConfirmPassword('');
          } catch (err) {
            let msg = '註冊失敗';
            if (err.code === 'auth/email-already-in-use') msg = '此信箱已被註冊';
            if (err.code === 'auth/weak-password') msg = '密碼長度至少需要 6 個字元';
            setAuthMessage({ type: 'error', text: msg });
          }
        } else {
          try {
            await signInWithEmailAndPassword(auth, email, password);
            setEmail('');
            setPassword('');
            setActiveTab('dashboard');
          } catch (err) {
            let msg = '登入失敗，請檢查帳號密碼';
            if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') msg = '帳號或密碼錯誤';
            setAuthMessage({ type: 'error', text: msg });
          }
        }
      };

      const handleLogout = async () => {
        if (user) {
          localStorage.removeItem(`life_reflection_profile_${user.uid}`);
          localStorage.removeItem(`life_reflection_txs_${user.uid}`);
          localStorage.removeItem(`life_reflection_subs_${user.uid}`);
          localStorage.removeItem(`life_reflection_items_${user.uid}`);
        }
        await signOut(auth);
        setIsProfileOpen(false);
        setActiveTab('dashboard');
      };

      // --- 圖片壓縮處理 ---
      const compressImage = (file, maxDimension = 300, quality = 0.7) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > maxDimension) {
                  height = Math.round((height * maxDimension) / width);
                  width = maxDimension;
                }
              } else {
                if (height > maxDimension) {
                  width = Math.round((width * maxDimension) / height);
                  height = maxDimension;
                }
              }

              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = reject;
            img.src = event.target.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      };

      const handleAvatarUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const compressedBase64 = await compressImage(file, 250, 0.7); 
          setProfileData(prev => ({ ...prev, avatar: compressedBase64 }));
        } catch (err) { console.error(err); }
      };

      const handleDashboardBgUpload = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const compressedBase64 = await compressImage(file, 800, 0.6); 
          setProfileData(prev => ({ ...prev, dashboardBg: compressedBase64 }));
        } catch (err) { console.error(err); }
      };

      // 儲存設定至 Firebase
      const handleSaveProfile = async () => {
        if (!user) return;
        setIsSavingProfile(true);
        setProfileSaveMsg(null);
        try {
          await updateProfile(auth.currentUser, {
            displayName: profileData.nickname
          });
          
          await setDoc(doc(db, `artifacts/${APP_ID}/users/${user.uid}/profile`, 'info'), {
            nickname: profileData.nickname,
            avatar: profileData.avatar || '',
            dashboardBg: profileData.dashboardBg || '',
            signature: profileData.signature || ''
          }, { merge: true });
          
          setUser({ ...auth.currentUser, displayName: profileData.nickname });
          
          setProfileSaveMsg({ type: 'success', text: '設定已成功儲存！' });
          
          setTimeout(() => {
            setProfileSaveMsg(null);
          }, 2000);

        } catch (err) { 
          console.error(err); 
          setProfileSaveMsg({ type: 'error', text: '儲存失敗，請重試 (圖片可能過大)' });
        } finally { 
          setIsSavingProfile(false); 
        }
      };

      // --- 資料收支新增 ---
      const handleAddTransaction = async (e) => {
        e.preventDefault();
        const finalCategory = txCategory.trim() || '未分類';
        if (!txAmount || !txNote || !user) return;
        try {
          await addDoc(collection(db, `artifacts/${APP_ID}/users/${user.uid}/transactions`), {
            type: txType,
            amount: parseFloat(txAmount),
            note: txNote,
            category: finalCategory,
            date: txDate,
            createdAt: Date.now()
          });
          setTxAmount('');
          setTxNote('');
          setTxCategory('');
        } catch (err) { console.error(err); }
      };

      const handleAddSubscription = async (e) => {
        e.preventDefault();
        if (!subName || !subAmount || !user) return;
        try {
          await addDoc(collection(db, `artifacts/${APP_ID}/users/${user.uid}/subscriptions`), {
            name: subName,
            amount: parseFloat(subAmount),
            cycle: subCycle,
            nextDate: subDate,
            isPaused: false,
            isPaid: false,
            createdAt: Date.now()
          });
          setSubName('');
          setSubAmount('');
        } catch (err) { console.error(err); }
      };

      const handleAddItem = async (e) => {
        e.preventDefault();
        const finalCategory = itemCategory.trim() || '未分類';
        if (!itemName || !itemPrice || !user) return;
        try {
          const priceNum = parseFloat(itemPrice);
          await addDoc(collection(db, `artifacts/${APP_ID}/users/${user.uid}/items`), {
            name: itemName,
            price: priceNum,
            category: finalCategory,
            purchaseDate: itemDate,
            isRetired: false,
            retireDate: '',
            createdAt: Date.now()
          });
          await addDoc(collection(db, `artifacts/${APP_ID}/users/${user.uid}/transactions`), {
            type: 'expense',
            amount: priceNum,
            note: `分攤購入: ${itemName}`,
            category: finalCategory,
            date: itemDate,
            createdAt: Date.now()
          });
          setItemName('');
          setItemPrice('');
          setItemCategory('');
        } catch (err) { console.error(err); }
      };

      // --- 確認刪除機制 ---
      const confirmDelete = async () => {
        if (!deleteDialog.isOpen || !user) return;
        const { type, id, data } = deleteDialog;
        
        try {
          if (type === 'transaction') {
            await deleteDoc(doc(db, `artifacts/${APP_ID}/users/${user.uid}/transactions`, id));
          } else if (type === 'subscription') {
            await deleteDoc(doc(db, `artifacts/${APP_ID}/users/${user.uid}/subscriptions`, id));
          } else if (type === 'item') {
            await deleteDoc(doc(db, `artifacts/${APP_ID}/users/${user.uid}/items`, id));
            const matchedTx = transactions.find(t => t.note === `分攤購入: ${data.name}` && t.amount === data.price);
            if (matchedTx) {
              await deleteDoc(doc(db, `artifacts/${APP_ID}/users/${user.uid}/transactions`, matchedTx.id));
            }
          }
        } catch (err) { console.error("刪除失敗", err); }

                <div className="p-6 border-b flex justify-between items-center">
                  <h3 className="text-xl font-bold flex items-center gap-2">
                    <Settings className="text-teal-500" size={22} /> 個人資料設定
                  </h3>
                  <button onClick={() => setIsProfileOpen(false)} className="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors">
                    <X size={20} />
                  </button>
                </div>
                
                <div className="p-6 overflow-y-auto space-y-5 overscroll-contain">
                  
                  {/* --- 上傳狀態提示訊息 --- */}
                  {profileSaveMsg && (
                    <div className={`p-3 rounded-xl text-sm font-medium flex items-center justify-center gap-2 animate-in fade-in slide-in-from-top-2 ${
                      profileSaveMsg.type === 'error' ? 'bg-rose-50 text-rose-600 border border-rose-100' : 'bg-[#D4F5ED] text-[#35a788]'
                    }`}>
                      {profileSaveMsg.type === 'error' ? <AlertTriangle size={18} /> : <CheckCircle2 size={18} />}
                      {profileSaveMsg.text}
                    </div>
                  )}

                  <div className="flex justify-center">
                    <div className="relative w-24 h-24 group">
                      <input type="file" onChange={handleAvatarUpload} className="absolute inset-0 opacity-0 z-10 cursor-pointer" accept="image/*" />
                      <div className="w-24 h-24 rounded-full overflow-hidden border-4 border-[#C7F3EC] bg-slate-50 flex items-center justify-center text-teal-300">
                        {profileData?.avatar ? <img src={profileData.avatar} className="w-full h-full object-cover" /> : <User size={40} className="text-[#35a788]" />}
                      </div>
                      <div className="absolute bottom-0 right-0 bg-teal-500 w-8 h-8 flex items-center justify-center rounded-full text-white border-2 border-white">
                        <Camera size={14} />
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <div>
                      <label className="text-xs font-bold text-slate-400 mb-1 block">我的暱稱</label>
                      <input type="text" value={profileData?.nickname || ''} onChange={e => setProfileData({...profileData, nickname: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#C7F3EC] outline-none transition-all text-slate-800" placeholder="輸入暱稱" />
                    </div>
                    <div>
                      <label className="text-xs font-bold text-slate-400 mb-1 block">個性簽名</label>
                      <textarea value={profileData?.signature || ''} onChange={e => setProfileData({...profileData, signature: e.target.value})} rows="2" className="w-full p-3 bg-slate-50 rounded-xl border border-slate-200 focus:ring-2 focus:ring-[#C7F3EC] outline-none transition-all text-slate-800 resize-none" placeholder="寫一句話介紹自己..."></textarea>
                    </div>
                    <div>
                      <label className="text-xs font-bold text-slate-400 mb-1 block">更換主頁背景圖</label>
                      <div className="mt-1 flex items-center gap-3">
                        <input type="file" onChange={handleDashboardBgUpload} className="text-xs flex-grow cursor-pointer text-slate-500" accept="image/*" />
                        {profileData?.dashboardBg && (
                          <button onClick={() => setProfileData({...profileData, dashboardBg: ''})} className="text-rose-500 text-xs font-bold bg-rose-50 px-3 py-1.5 rounded-full hover:bg-rose-100 transition-colors shrink-0">
                            移除背景
                          </button>
                        )}
                      </div>
                    </div>
                  </div>

                  <button onClick={handleSaveProfile} disabled={isSavingProfile} className="w-full bg-teal-500 hover:bg-teal-600 text-white py-4 rounded-2xl font-bold mt-4 transition-all active:scale-95 flex justify-center items-center gap-2">
                    {isSavingProfile ? <Loader2 className="animate-spin" size={18} /> : '確認修改'}
                  </button>
                  
                  <button onClick={handleLogout} className="w-full text-slate-400 hover:text-rose-500 text-sm font-bold flex items-center justify-center gap-2 py-2 mt-2 transition-colors">
                    <LogOut size={16} /> 登出帳號
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
